<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الإضافة - المفضلات</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            width: 320px;
            padding: 16px;
            margin: 0;
            background-color: #f8fafc;
            color: #0f172a;
        }

        h2 {
            margin-top: 0;
            font-size: 16px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 13px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            font-size: 14px;
        }

        button:hover {
            background-color: #2563eb;
        }

        .status {
            margin-top: 12px;
            font-size: 13px;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            display: none;
        }

        .success {
            background-color: #dcfce7;
            color: #166534;
            display: block;
        }

        .error {
            background-color: #fee2e2;
            color: #991b1b;
            display: block;
        }

        hr {
            border: 0;
            border-top: 1px solid #e2e8f0;
            margin: 16px 0;
        }

        .info-text {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            margin-bottom: 0;
        }
    </style>
</head>

<body>
    <h2>⚙️ لوحة تحكم المزامنة</h2>

    <div id="setup-form">
        <div class="form-group">
            <label>رابط Supabase URL</label>
            <input type="text" id="supabaseUrl" placeholder="https://xxx.supabase.co" dir="ltr">
        </div>
        <div class="form-group">
            <label>مفتاح Supabase Key</label>
            <input type="password" id="supabaseKey" placeholder="eyJh..." dir="ltr">
        </div>

        <hr>

        <div class="form-group">
            <label>البريد الإلكتروني (لتسجيل الدخول)</label>
            <input type="email" id="email" placeholder="email@example.com" dir="ltr">
        </div>
        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••" dir="ltr">
        </div>

        <button id="saveBtn">حفظ وتسجيل الدخول</button>
    </div>

    <div id="statusMsg" class="status"></div>

    <p class="info-text">
        بمجرد الاتصال، انقر Right-Click على أي نص أو رابط في أي موقع لحفظه مباشرة في تطبيقك.
    </p>

    <!-- <script src="lib/supabase.umd.js"></script> -->
    <!-- Note: Due to Manifest V3 policy on external/dynamic code execution, 
       we bundle the interaction logic in popup.js -->
    <script src="popup.js" type="module"></script>
</body>

</html>
